<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Facturación V2.0 - Predicción de Riesgo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --tigo: #0033A0; --danger: #EF476F; --warning: #FFD166; --success: #06D6A0; --churn: #4a4a4a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--tigo); color: white; padding: 20px; transition: background 0.5s ease; }
        body.risk-medium { background: #855500; }
        body.risk-high { background: #5a0000; }
        body.churn-mode { background: #222; }

        .container { max-width: 420px; margin: auto; }
        .card { background: rgba(255,255,255,0.12); padding: 18px; border-radius: 16px; margin-bottom: 15px; backdrop-filter: blur(10px); }
        input { width: 100%; height: 45px; border-radius: 10px; border: none; margin-bottom: 10px; padding: 10px; }
        
        .timeline-container { position: relative; height: 180px; margin: 30px 0; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 10px; }
        .line { position: absolute; top: 50%; width: 90%; left: 5%; height: 4px; background: rgba(255,255,255,0.3); }
        
        .event { position: absolute; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; transform: translate(-50%, -50%); z-index: 5; }
        .pay { background: var(--success); cursor: grab; z-index: 10; box-shadow: 0 0 15px rgba(6,214,160,0.5); }
        .corte { background: #000; color: #fff; border: 2px solid var(--danger); display: none; }
        
        .label { position: absolute; font-size: 10px; transform: translateX(-50%); width: 70px; text-align: center; opacity: 0.8; }
        
        .status-pill { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-block; margin-bottom: 10px; }
        .bg-success { background: var(--success); }
        .bg-danger { background: var(--danger); }

        #churn-stamp { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg); font-size: 40px; font-weight: 900; color: rgba(255,0,0,0.4); border: 10px solid rgba(255,0,0,0.4); padding: 20px; pointer-events: none; display: none; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 20px;">Facturación Pro 2.0</h2>
    
    <div class="card">
        <label style="font-size: 11px;">FECHA INSTALACIÓN</label>
        <input type="date" id="fecha" onchange="simular()">
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="font-size: 11px;">PLAN</label>
                <input type="number" id="plan" value="180000">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 11px;">ANTICIPO</label>
                <input type="number" id="anticipo" value="0">
            </div>
        </div>
    </div>

    <div id="status-display" class="status-pill bg-success">CUENTA SANA</div>

    <div class="timeline-container">
        <div class="line"></div>
        <div id="ev-inst" class="event" style="background: #4CC9F0; top: 50%; left: 10%;">I</div>
        <div id="ev-vence" class="event" style="background: var(--danger); top: 50%; left: 40%;">V1</div>
        <div id="ev-corte" class="event corte" style="top: 50%; left: 55%;">✂</div>
        
        <div id="ev-pay" class="event pay" style="top: 30%; left: 25%;">P</div>
        
        <div id="label-pay" class="label" style="top: 10%; left: 25%;">Día de Pago</div>
    </div>

    <div id="info-box" class="card" style="min-height: 120px;">
        <div id="content-normal">
            <p id="msg-emision">Emisión: --/--/--</p>
            <p style="color: var(--success); font-size: 12px;">💡 Tip: Pago en los primeros 3 días mejora el Early Churn.</p>
        </div>
        <div id="content-risk" style="display: none;">
            <p style="color: var(--warning); font-weight: bold;">⚠️ RIESGO DE CORTE ACTIVO</p>
            <p id="msg-corte">Fecha de Suspensión: --/--/--</p>
        </div>
    </div>
</div>

<div id="churn-stamp">CUENTA EN CHURN</div>

<script>
    const tabla = { 1: { v: 15, c: 3 }, 7: { v: 21, c: 9 }, 15: { v: 1, c: 17 }, 21: { v: 5, c: 4 } };
    let currentCiclo = 7;

    function simular() {
        const f = new Date(document.getElementById('fecha').value + 'T00:00:00');
        const dia = f.getDate();
        
        if (dia <= 6) currentCiclo = 7;
        else if (dia <= 14) currentCiclo = 15;
        else if (dia <= 20) currentCiclo = 21;
        else currentCiclo = 1;

        document.getElementById('msg-emision').innerText = `Ciclo: ${currentCiclo} | Emisión: ${currentCiclo}/${f.getMonth()+2}/${f.getFullYear()}`;
    }

    const pay = document.getElementById('ev-pay');
    const container = document.querySelector('.timeline-container');

    const handleMove = (e) => {
        let rect = container.getBoundingClientRect();
        let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        let pos = Math.max(5, Math.min(95, (x / rect.width) * 100));
        
        pay.style.left = pos + '%';
        document.getElementById('label-pay').style.left = pos + '%';

        // LÓGICA DE GESTIÓN 2.0
        if (pos > 40 && pos < 75) { // Pasó Vencimiento 1
            document.body.className = 'risk-medium';
            document.getElementById('ev-corte').style.display = 'flex';
            document.getElementById('content-normal').style.display = 'none';
            document.getElementById('content-risk').style.display = 'block';
            document.getElementById('status-display').innerText = 'RIESGO DE MORA';
            document.getElementById('status-display').className = 'status-pill bg-danger';
        } 
        else if (pos >= 75) { // Hacia el Churn (4 meses simulados)
            document.body.className = 'churn-mode';
            document.getElementById('churn-stamp').style.display = 'block';
            document.getElementById('status-display').innerText = 'EARLY CHURN DETECTADO';
        }
        else { // Sano
            document.body.className = '';
            document.getElementById('ev-corte').style.display = 'none';
            document.getElementById('content-normal').style.display = 'block';
            document.getElementById('content-risk').style.display = 'none';
            document.getElementById('churn-stamp').style.display = 'none';
            document.getElementById('status-display').innerText = 'CUENTA SANA';
            document.getElementById('status-display').className = 'status-pill bg-success';
        }
    };

    pay.addEventListener('mousedown', () => document.addEventListener('mousemove', handleMove));
    document.addEventListener('mouseup', () => document.removeEventListener('mousemove', handleMove));
    pay.addEventListener('touchstart', () => document.addEventListener('touchmove', handleMove));
    document.addEventListener('touchend', () => document.removeEventListener('touchmove', handleMove));
</script>
</body>
</html>
